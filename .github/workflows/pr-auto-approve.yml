name: Reusable PR Auto-Approve (Copilot)

on:
  workflow_call:
    inputs:
      bot_login:
        required: true
        type: string
        description: >-
          GitHub login of the bot account that will post the APPROVE review.
          The BOT_GITHUB_TOKEN secret must be a PAT for this account.
      base_branch:
        required: false
        type: string
        default: 'main'
        description: >-
          Base branch that PRs must target to be eligible for auto-approval
          (default: main). Set to 'develop' or any branch name used in your
          repository.
      sandbox_repos:
        required: false
        type: string
        default: ''
        description: >-
          Comma-separated list of repo full names (owner/repo) where
          bot-authored PRs are allowed through the self-approval guard.
          Used only by e2e test harnesses in sandbox/test repositories.
          Production repos must not appear here.
      test_copilot_logins:
        required: false
        type: string
        default: ''
        description: >-
          Test-only: comma-separated GitHub logins to treat as "Copilot"
          reviewers in addition to the real Copilot bot. Used by the e2e
          harness in sandbox repos listed in sandbox_repos; production
          callers MUST NOT set this.
      slack_channel:
        required: false
        type: string
        default: 'alert-pr-notifications'
        description: >-
          Slack channel name or ID for notifications (default:
          alert-pr-notifications). Used only when SLACK_BOT_TOKEN is set.
          The Slack app behind SLACK_BOT_TOKEN must be a member of this
          channel.
      pr_review_ref:
        required: false
        type: string
        default: 'develop'
        description: >-
          Git ref on steerspec/strspc-pr-review to checkout for decide.js.
          Defaults to `develop`. Callers that pin to a release tag should
          pass the matching tag name (e.g. `pr-auto-approve-v1.0.0`) so
          decide.js is version-locked.
    secrets:
      BOT_GITHUB_TOKEN:
        required: true
        description: 'PAT for the bot_login account with repo scope (approves the PR)'
      SLACK_BOT_TOKEN:
        required: false
        description: >-
          Slack bot OAuth token (xoxb-...) with `chat:write` scope. When
          set, posts approve/skip/error notifications via chat.postMessage
          to the channel in `slack_channel`.

permissions:
  pull-requests: write
  contents: read
  checks: read

concurrency:
  # Serialize runs per PR. For check_run events the PR number comes from
  # github.event.check_run.pull_requests[0].number. Fall back to run_id only
  # when no PR context is available (shouldn't happen in practice).
  group: >-
    pr-auto-approve-${{ github.repository }}-${{
      github.event.pull_request.number ||
      github.event.check_run.pull_requests[0].number ||
      github.run_id
    }}
  cancel-in-progress: true

jobs:
  approve:
    name: Auto-approve if Copilot conditions met
    runs-on: ubuntu-latest
    # Defense-in-depth: the caller template already has these guards, but we
    # duplicate them here so the reusable workflow is safe even if a caller
    # forgets them or invokes us from another workflow. Fork PRs don't have
    # access to BOT_GITHUB_TOKEN, so we skip them cleanly.
    # check_run events carry no pull_request payload — allow them through here
    # and let decide.js extract the PR from check_run.pull_requests. We exclude
    # our own job name to break the feedback loop (auto-approve completing
    # would otherwise re-trigger itself via the check_run event).
    if: >-
      (
        github.event.pull_request != null &&
        github.event.pull_request.base.ref == inputs.base_branch &&
        github.event.pull_request.draft == false &&
        github.event.pull_request.head.repo.full_name == github.repository
      ) || (
        github.event_name == 'check_run' &&
        github.event.check_run.name != 'Auto-approve if Copilot conditions met'
      )
    outputs:
      decision: ${{ steps.evaluate.outputs.decision }}
      reason: ${{ steps.evaluate.outputs.reason }}
    env:
      # Expose at job level so step-level `if:` can check `env.SLACK_BOT_TOKEN != ''`.
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL: ${{ inputs.slack_channel }}
    steps:
      # Check out steerspec/strspc-pr-review at the ref specified by the caller
      # (defaults to `main`). Callers that pin to a release tag should pass
      # `pr_review_ref: pr-auto-approve-vX.Y.Z` explicitly.
      - name: Checkout strspc-pr-review (for decide.js)
        uses: actions/checkout@v4
        with:
          repository: steerspec/strspc-pr-review
          ref: ${{ inputs.pr_review_ref }}
          path: .strspc-pr-review
          persist-credentials: false
          token: ${{ secrets.BOT_GITHUB_TOKEN }}

      - name: Request bot review
        if: >-
          github.event_name == 'pull_request' &&
          (github.event.action == 'opened' || github.event.action == 'ready_for_review' || github.event.action == 'reopened')
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.BOT_GITHUB_TOKEN }}
          script: |
            const botLogin = '${{ inputs.bot_login }}';
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
            const alreadyRequested = pr.requested_reviewers.some(r => r.login === botLogin);
            if (!alreadyRequested) {
              await github.rest.pulls.requestReviewers({
                owner, repo, pull_number: prNumber,
                reviewers: [botLogin],
              });
            }

      - name: Evaluate and approve
        id: evaluate
        uses: actions/github-script@v7
        env:
          AUTO_APPROVE_BOT_LOGIN: ${{ inputs.bot_login }}
          AUTO_APPROVE_BASE_BRANCH: ${{ inputs.base_branch }}
          AUTO_APPROVE_SANDBOX_REPOS: ${{ inputs.sandbox_repos }}
          AUTO_APPROVE_COPILOT_TEST_LOGINS: ${{ inputs.test_copilot_logins }}
        with:
          github-token: ${{ secrets.BOT_GITHUB_TOKEN }}
          script: |
            const decide = require('./.strspc-pr-review/scripts/pr-auto-approve/decide.js');
            await decide({ github, context, core });

      - name: Notify Slack (approved)
        if: steps.evaluate.outputs.decision == 'approved' && env.SLACK_BOT_TOKEN != ''
        continue-on-error: true
        env:
          REPO: ${{ github.repository }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          REASON: ${{ steps.evaluate.outputs.reason }}
        run: |
          payload=$(jq -nc \
            --arg channel "$SLACK_CHANNEL" \
            --arg repo "$REPO" \
            --arg url "$PR_URL" \
            --arg num "$PR_NUMBER" \
            --arg title "$PR_TITLE" \
            --arg author "$PR_AUTHOR" \
            --arg reason "$REASON" \
            'def s: gsub("&";"&amp;")|gsub("<";"&lt;")|gsub(">";"&gt;")|gsub("\\|";"｜");
             {channel: $channel,
              attachments: [{
                color: "#36a64f",
                text: ("<" + $url + "|" + ($repo | split("/")[-1]) + "#" + $num + ">  @" + $author + " — " + ($title|s) + "\n" + ($reason|s))
              }]}')
          curl -sS -X POST \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H 'Content-type: application/json; charset=utf-8' \
            --data "$payload" \
            https://slack.com/api/chat.postMessage

      - name: Notify Slack (skipped)
        if: steps.evaluate.outputs.decision == 'skip' && env.SLACK_BOT_TOKEN != ''
        continue-on-error: true
        env:
          REPO: ${{ github.repository }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          REASON: ${{ steps.evaluate.outputs.reason }}
        run: |
          payload=$(jq -nc \
            --arg channel "$SLACK_CHANNEL" \
            --arg repo "$REPO" \
            --arg url "$PR_URL" \
            --arg num "$PR_NUMBER" \
            --arg title "$PR_TITLE" \
            --arg author "$PR_AUTHOR" \
            --arg reason "$REASON" \
            'def s: gsub("&";"&amp;")|gsub("<";"&lt;")|gsub(">";"&gt;")|gsub("\\|";"｜");
             {channel: $channel,
              attachments: [{
                color: "#e8912d",
                text: ("<" + $url + "|" + ($repo | split("/")[-1]) + "#" + $num + ">  @" + $author + " — " + ($title|s) + "\nskipped: " + ($reason|s))
              }]}')
          curl -sS -X POST \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H 'Content-type: application/json; charset=utf-8' \
            --data "$payload" \
            https://slack.com/api/chat.postMessage

      - name: Notify Slack (error)
        if: failure() && env.SLACK_BOT_TOKEN != ''
        continue-on-error: true
        env:
          REPO: ${{ github.repository }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          payload=$(jq -nc \
            --arg channel "$SLACK_CHANNEL" \
            --arg repo "$REPO" \
            --arg url "$PR_URL" \
            --arg num "$PR_NUMBER" \
            --arg title "$PR_TITLE" \
            --arg author "$PR_AUTHOR" \
            --arg runUrl "$RUN_URL" \
            'def s: gsub("&";"&amp;")|gsub("<";"&lt;")|gsub(">";"&gt;")|gsub("\\|";"｜");
             {channel: $channel,
              attachments: [{
                color: "#ff0000",
                text: ("<" + $url + "|" + ($repo | split("/")[-1]) + "#" + $num + ">  @" + $author + " — " + ($title|s) + "\nerror — <" + $runUrl + "|run log>")
              }]}')
          curl -sS -X POST \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H 'Content-type: application/json; charset=utf-8' \
            --data "$payload" \
            https://slack.com/api/chat.postMessage
